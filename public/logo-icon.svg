<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#iconGradient)"/>
  
  <!-- Stack blocks -->
  <g transform="translate(128, 140)">
    <!-- Bottom block -->
    <rect x="0" y="140" width="256" height="72" rx="8" fill="white" opacity="0.95"/>
    <rect x="16" y="152" width="80" height="48" rx="6" fill="url(#blockGradient)" opacity="0.3"/>
    
    <!-- Middle block -->
    <rect x="32" y="80" width="192" height="64" rx="8" fill="white" opacity="0.9"/>
    <rect x="48" y="92" width="64" height="40" rx="6" fill="url(#blockGradient)" opacity="0.35"/>
    
    <!-- Top block -->
    <rect x="64" y="20" width="128" height="64" rx="8" fill="white" opacity="0.85"/>
    <rect x="80" y="32" width="48" height="40" rx="6" fill="url(#blockGradient)" opacity="0.4"/>
    
    <!-- AI sparkle -->
    <circle cx="220" cy="50" r="6" fill="#fbbf24" opacity="0.9"/>
    <circle cx="240" cy="100" r="5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="200" cy="160" r="5" fill="#fbbf24" opacity="0.85"/>
  </g>
</svg>
