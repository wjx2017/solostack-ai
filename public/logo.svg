<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main stack blocks -->
  <g transform="translate(56, 80)">
    <!-- Bottom block -->
    <rect x="0" y="200" width="400" height="120" rx="12" fill="url(#stackGradient)" opacity="0.9"/>
    <rect x="20" y="220" width="160" height="80" rx="8" fill="white" opacity="0.2"/>
    
    <!-- Middle block -->
    <rect x="40" y="120" width="320" height="100" rx="12" fill="url(#stackGradient)" opacity="0.85"/>
    <rect x="60" y="140" width="120" height="60" rx="8" fill="white" opacity="0.25"/>
    
    <!-- Top block -->
    <rect x="80" y="40" width="240" height="100" rx="12" fill="url(#stackGradient)" opacity="0.8"/>
    <rect x="100" y="60" width="80" height="60" rx="8" fill="white" opacity="0.3"/>
    
    <!-- AI sparkles -->
    <circle cx="380" cy="80" r="8" fill="#fbbf24" opacity="0.9"/>
    <circle cx="420" cy="140" r="6" fill="#fbbf24" opacity="0.8"/>
    <circle cx="360" cy="240" r="7" fill="#fbbf24" opacity="0.85"/>
    
    <!-- Connection lines -->
    <path d="M200 40 L200 20" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <circle cx="200" cy="12" r="6" fill="url(#logoGradient)"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="460" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="url(#logoGradient)" text-anchor="middle">SOLOSTACK</text>
  <text x="256" y="500" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#6366f1" text-anchor="middle" letter-spacing="4">AI</text>
</svg>
