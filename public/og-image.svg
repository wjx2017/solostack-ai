<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ogGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ogBlockGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="530" r="120" fill="white" opacity="0.05"/>
  <circle cx="950" cy="80" r="60" fill="white" opacity="0.08"/>
  
  <!-- Stack blocks (left side) -->
  <g transform="translate(120, 180)">
    <!-- Bottom block -->
    <rect x="0" y="160" width="320" height="90" rx="14" fill="white" opacity="0.95"/>
    <rect x="24" y="180" width="120" height="50" rx="8" fill="url(#ogBlockGradient)" opacity="0.25"/>
    
    <!-- Middle block -->
    <rect x="48" y="90" width="240" height="80" rx="14" fill="white" opacity="0.9"/>
    <rect x="72" y="110" width="96" height="40" rx="8" fill="url(#ogBlockGradient)" opacity="0.3"/>
    
    <!-- Top block -->
    <rect x="96" y="20" width="160" height="80" rx="14" fill="white" opacity="0.85"/>
    <rect x="120" y="40" width="64" height="40" rx="8" fill="url(#ogBlockGradient)" opacity="0.35"/>
    
    <!-- AI sparkles -->
    <circle cx="280" cy="60" r="10" fill="#fbbf24" opacity="0.9"/>
    <circle cx="300" cy="130" r="8" fill="#fbbf24" opacity="0.85"/>
    <circle cx="260" cy="200" r="9" fill="#fbbf24" opacity="0.8"/>
  </g>
  
  <!-- Text (right side) -->
  <text x="520" y="240" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">SOLOSTACK AI</text>
  
  <text x="520" y="340" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="400" fill="white" opacity="0.95">Find Your Perfect AI Tool Stack</text>
  <text x="520" y="390" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="400" fill="white" opacity="0.95">in 5 Minutes</text>
  
  <!-- Bottom accent -->
  <rect x="520" y="450" width="600" height="4" rx="2" fill="white" opacity="0.3"/>
  
  <!-- Tagline -->
  <text x="520" y="510" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="white" opacity="0.8">Transparent pricing • Clear comparisons • No wasted subscriptions</text>
</svg>
